;=============================================================
; Asterisk 발신자 이름 조회 (func_odbc + 로컬 MySQL)
;=============================================================

; --- /etc/asterisk/res_odbc.conf ---------------------------
; (ODBC DSN. unixODBC + MariaDB Connector/ODBC 필요)
[asterisk_mysql]
enabled => yes
dsn => asterisk-connector
username => asterisk_ro
password => CHANGE_ME
pre-connect => yes


; --- /etc/odbc.ini (unixODBC) ------------------------------
; [asterisk-connector]
; Description = MySQL for Asterisk
; Driver      = MariaDB
; Server      = 127.0.0.1
; Port        = 3306
; Database    = asterisk
; Charset     = utf8mb4


; --- /etc/asterisk/func_odbc.conf --------------------------
[CIDNAME]
dsn=asterisk_mysql
readsql=SELECT name FROM cid_lookup WHERE phone='${SQL_ESC(${ARG1})}' LIMIT 1


